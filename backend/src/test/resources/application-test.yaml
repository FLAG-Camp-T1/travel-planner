spring:
  datasource:
    url: jdbc:h2:mem:travelplanner;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/test-migration

app:
  jwt:
    secret: test-jwt-secret-key-for-integration-tests-123456
  bootstrap:
    seed-enabled: false
